const dates = rawData.map(d => d[0]);
const opens = rawData.map(d => d[1]);
const highs = rawData.map(d => d[2]);
const lows = rawData.map(d => d[3]);
const closes = rawData.map(d => d[4]);

// RS data
const rsData = {
  "2026-04-15": {rating:86,r2:0.422}, "2026-04-16": {rating:86,r2:0.446},
  "2026-04-17": {rating:91,r2:0.456}, "2026-04-20": {rating:89,r2:0.469},
  "2026-04-21": {rating:87,r2:0.459}, "2026-04-22": {rating:92,r2:0.459},
  "2026-04-23": {rating:91,r2:0.452}, "2026-04-24": {rating:90,r2:0.442},
  "2026-04-27": {rating:88,r2:0.425}, "2026-04-28": {rating:89,r2:0.406},
  "2026-04-29": {rating:87,r2:0.390}, "2026-04-30": {rating:87,r2:0.361},
  "2026-05-01": {rating:91,r2:0.341}, "2026-05-04": {rating:96,r2:0.336},
  "2026-05-05": {rating:96,r2:0.323}, "2026-05-06": {rating:96,r2:0.315},

  "2026-05-11": {rating:96,r2:0.276}, "2026-05-12": {rating:96,r2:0.267},
};

// Draw chart
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
canvas.width = canvas.offsetWidth * dpr;
canvas.height = 400 * dpr;
ctx.scale(dpr, dpr);
const W = canvas.offsetWidth;
const H = 400;

const padL = 60, padR = 60, padT = 30, padB = 50;
const chartW = W - padL - padR;
const chartH = H - padT - padB;

const allPrices = [...highs, ...lows];
const minP = Math.floor(Math.min(...allPrices) / 5) * 5;
const maxP = Math.ceil(Math.max(...allPrices) / 5) * 5;

function x(i) { return padL + (i / (dates.length - 1)) * chartW; }
function y(p) { return padT + (1 - (p - minP) / (maxP - minP)) * chartH; }

// Grid
ctx.strokeStyle = '#222';
ctx.lineWidth = 0.5;
for (let p = minP; p <= maxP; p += 10) {
  ctx.beginPath();
  ctx.moveTo(padL, y(p));
  ctx.lineTo(W - padR, y(p));
  ctx.stroke();
  ctx.fillStyle = '#666';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('$' + p, padL - 6, y(p) + 4);
}

// X labels
ctx.textAlign = 'center';
const monthLabels = {};
dates.forEach((d, i) => {
  const m = d.substring(0, 7);
  if (!monthLabels[m]) {
    monthLabels[m] = i;
    ctx.fillStyle = '#666';
    ctx.fillText(d.substring(5, 7) + '月', x(i), H - padB + 20);
  }
});

// Phase annotations
const phases = [
  { start: "2026-01-14", end: "2026-02-05", color: "rgba(255,82,82,0.08)", label: "① 暴跌", labelColor: "#ff5252" },
  { start: "2026-02-05", end: "2026-02-24", color: "rgba(255,193,7,0.06)", label: "② 底部横盘", labelColor: "#ffc107" },
  { start: "2026-02-25", end: "2026-03-17", color: "rgba(76,175,80,0.08)", label: "③ 暴力拉升", labelColor: "#4caf50" },
  { start: "2026-03-24", end: "2026-04-10", color: "rgba(255,82,82,0.06)", label: "④ 二次下跌", labelColor: "#ff5252" },
  { start: "2026-04-13", end: "2026-04-30", color: "rgba(255,193,7,0.06)", label: "⑤ 宽幅震荡", labelColor: "#ffc107" },
  { start: "2026-05-01", end: "2026-05-12", color: "rgba(79,195,247,0.08)", label: "⑥ 二次拉升", labelColor: "#4fc3f7" },
];

phases.forEach(p => {
  const si = dates.indexOf(p.start);
  const ei = dates.indexOf(p.end);
  if (si >= 0 && ei >= 0) {
    ctx.fillStyle = p.color;
    ctx.fillRect(x(si), padT, x(ei) - x(si), chartH);
    ctx.fillStyle = p.labelColor;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.label, (x(si) + x(ei)) / 2, padT + 14);
  }
});

// Candlesticks
const barW = Math.max(2, chartW / dates.length * 0.6);
for (let i = 0; i < dates.length; i++) {
  const isUp = closes[i] >= opens[i];
  const color = isUp ? '#ff5252' : '#4caf50';  // Chinese convention: red=up
  ctx.strokeStyle = color;
  ctx.fillStyle = color;

  // Wick
  ctx.beginPath();
  ctx.moveTo(x(i), y(highs[i]));
  ctx.lineTo(x(i), y(lows[i]));
  ctx.lineWidth = 1;
  ctx.stroke();

  // Body
  const bodyTop = y(Math.max(opens[i], closes[i]));
  const bodyBot = y(Math.min(opens[i], closes[i]));
  const bodyH = Math.max(1, bodyBot - bodyTop);
  if (isUp) {
    ctx.fillRect(x(i) - barW/2, bodyTop, barW, bodyH);
  } else {
    ctx.fillRect(x(i) - barW/2, bodyTop, barW, bodyH);
  }
}

// Key price levels
const levels = [
  { price: 50.23, label: "底部 $50.23", color: "#4caf50" },
  { price: 136.65, label: "高点 $136.65", color: "#ff5252" },
];
levels.forEach(l => {
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = l.color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, y(l.price));
  ctx.lineTo(W - padR, y(l.price));
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = l.color;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(l.label, W - padR + 4, y(l.price) + 4);
});

// RS Rating overlay (right axis)
ctx.fillStyle = '#4fc3f7';
ctx.font = '11px monospace';
ctx.textAlign = 'left';
for (let r = 80; r <= 99; r += 5) {
  const ry = padT + (1 - (r - 75) / 30) * chartH;
  ctx.fillText('RS ' + r, W - padR + 4, ry + 4);
  ctx.strokeStyle = '#1a2a3a';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2, 4]);
  ctx.beginPath();
  ctx.moveTo(padL, ry);
  ctx.lineTo(W - padR, ry);
  ctx.stroke();
  ctx.setLineDash([]);
}

// RS line
ctx.beginPath();
ctx.strokeStyle = '#4fc3f7';
ctx.lineWidth = 2;
let started = false;
dates.forEach((d, i) => {
  if (rsData[d]) {
    const ry = padT + (1 - (rsData[d].rating - 75) / 30) * chartH;
    if (!started) { ctx.moveTo(x(i), ry); started = true; }
    else ctx.lineTo(x(i), ry);
  }
});
ctx.stroke();

// RS 95 threshold line
const rs95y = padT + (1 - (95 - 75) / 30) * chartH;
ctx.setLineDash([6, 3]);
ctx.strokeStyle = '#ff9800';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(padL, rs95y);
ctx.lineTo(W - padR, rs95y);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = '#ff9800';
ctx.textAlign = 'right';
ctx.fillText('RS 95 阈值', padL - 6, rs95y - 6);

// Breakout marker
const breakDate = "2026-05-04";
const bi = dates.indexOf(breakDate);
if (bi >= 0) {
  ctx.fillStyle = '#ff9800';
  ctx.beginPath();
  ctx.arc(x(bi), y(closes[bi]) - 15, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('!', x(bi), y(closes[bi]) - 11.5);
  ctx.fillStyle = '#ff9800';
  ctx.font = '11px sans-serif';
  ctx.fillText('RS突破95', x(bi), y(closes[bi]) - 26);
}

document.getElementById('analysis').innerHTML = `
<h2>走势拆解</h2>

<div class="phase">
  <span class="phase-tag phase-red">① 暴跌</span>
  <div>1/14 ~ 2/5：从 <span class="highlight">$84.8</span> 一路跌到 <span class="highlight">$50.23</span>，跌幅 <span class="highlight">-41%</span>，16 个交易日。持续放量下跌。</div>
</div>

<div class="phase">

  <div>2/25 ~ 3/17：从 <span class="highlight">$61</span> 暴力拉到 <span class="highlight">$136</span>，涨幅 <span class="highlight">+123%</span>！2/25 单日跳空 +35%（$61→$83），成交量从 800 万暴增到 6400 万。后续连续突破 $100、$120。</div>
</div>

<div class="phase">
  <span class="phase-tag phase-red">④ 二次下跌</span>
  <div>3/24 ~ 4/10：从 $127 跌到 $85，跌幅 -33%。3/24 单日暴跌 -20%（$127→$101），后续继续走弱。</div>
</div>

<div class="phase">
  <span class="phase-tag phase-yellow">⑤ 宽幅震荡</span>
  <div>4/13 ~ 4/30：在 $85~$108 之间宽幅震荡，日波动极大（单日振幅经常 10%+），未能重回前高。</div>
</div>

<div class="phase">
  <span class="phase-tag phase-blue">⑥ 二次拉升</span>
  <div>5/1 ~ 5/12：从 <span class="highlight">$91</span> 再次暴力拉升到 <span class="highlight">$140</span>（盘中高点），5/4 单日 +20%，5/11 再次 +16%，成交量再次放到 5000 万。</div>
</div>

<h2>R² 为什么这么低 (0.27)</h2>

<p>站在 5/12 往前数 63 个交易日，回溯窗口大约是 <span class="highlight">2/19 ~ 5/12</span>，这段时间的走势是：</p>

<p style="padding:10px;background:#1a1a1a;border-radius:4px;font-family:monospace;margin:8px 0;">
$61 横盘 → $83 跳空 → $136 冲高 → $85 暴跌 → $108 反弹 → $91 再跌 → $140 再冲
</p>

<p>这是一个 <span class="highlight">巨幅震荡、两上两下</span> 的走势。线性回归只能画一条直线，但实际走势是"W 形 + 脉冲"——线性回归根本拟合不了这种非线性波动，所以 R² 只有 0.27。</p>

<h2>RS Rating 为什么还能到 96</h2>

<p>因为 <span class="highlight">涨幅确实巨大</span>：63 天前收盘价约 $57，今天 $124，涨幅 +117%。</p>
<p>即使 R² 只有 0.27，score = 117% × (0.5 + 0.5 × 0.27) = <span class="highlight">74 分</span>，在 2000 只股票里仍然排在前 4%。</p>

<div class="conclusion">
  <h2 style="margin-top:0">结论：这是什么类型的股票</h2>
  <p><strong>高波动率动量股</strong> —— 涨得猛、跌得也猛、振幅巨大。</p>
  <p>这类股票的特点是：</p>
  <ul style="margin: 8px 0 0 20px;">
    <li><strong>涨幅足够大</strong>，所以 rating 高</li>
    <li><strong>走势极不线性</strong>（暴涨暴跌交替），所以 R² 低</li>
    <li>不是"稳健趋势股"，而是"事件/情绪驱动的投机股"</li>
  </ul>
  <p style="margin-top:12px;">如果你用 R² > 0.5 过滤，<strong>会把 CRCL 这类高波动股全部过滤掉</strong>。该不该过滤取决于你的交易风格——做趋势跟踪就过滤掉，做动量博弈就保留。</p>
</div>
